<!DOCTYPE html>
    <html lang="id">
        <head>
            <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>Perkenalan Diri - Christian Ronaldo Wiguna</title>
                    <style>
                        * {
                            margin: 0;
                        padding: 0;
                        box-sizing: border-box;
        }

                        body {
                            font - family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        min-height: 100vh;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        padding: 20px;
        }

                        .container {
                            background: white;
                        border-radius: 20px;
                        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                        max-width: 500px;
                        width: 100%;
                        overflow: hidden;
                        animation: fadeIn 1s ease-out;
        }

                        @keyframes fadeIn {
                            from {
                            opacity: 0;
                        transform: translateY(-30px);
            }
                        to {
                            opacity: 1;
                        transform: translateY(0);
            }
        }

                        .header {
                            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        padding: 40px 30px;
                        text-align: center;
                        color: white;
        }

                        .avatar {
                            width: 120px;
                        height: 120px;
                        background: white;
                        border-radius: 50%;
                        margin: 0 auto 20px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-size: 50px;
                        border: 4px solid white;
                        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

                        .header h1 {
                            font - size: 28px;
                        margin-bottom: 10px;
                        animation: slideIn 0.8s ease-out 0.3s both;
        }

                        .header p {
                            font - size: 16px;
                        opacity: 0.9;
                        animation: slideIn 0.8s ease-out 0.5s both;
        }

                        @keyframes slideIn {
                            from {
                            opacity: 0;
                        transform: translateX(-20px);
            }
                        to {
                            opacity: 1;
                        transform: translateX(0);
            }
        }

                        .content {
                            padding: 30px;
        }

                        .info-item {
                            display: flex;
                        align-items: center;
                        padding: 15px 0;
                        border-bottom: 1px solid #f0f0f0;
                        animation: slideIn 0.8s ease-out calc(0.7s + var(--delay) * 0.15s) both;
        }

                        .info-item:last-child {
                            border - bottom: none;
        }

                        .icon {
                            width: 50px;
                        height: 50px;
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        border-radius: 12px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-size: 24px;
                        margin-right: 15px;
                        flex-shrink: 0;
        }

                        .info-text h3 {
                            color: #333;
                        font-size: 14px;
                        margin-bottom: 4px;
        }

                        .info-text p {
                            color: #666;
                        font-size: 16px;
                        font-weight: 600;
        }

                        .footer {
                            background: #f8f9fa;
                        padding: 20px 30px;
                        text-align: center;
        }

                        .footer p {
                            color: #666;
                        font-size: 14px;
        }

                        .heart {
                            color: #e74c3c;
                        animation: heartbeat 1.5s ease-in-out infinite;
        }

                        @keyframes heartbeat {
                            0 %, 100 % {
                                transform: scale(1);
                            }
            50% {
                            transform: scale(1.2);
            }
        }
                    </style>
                </head>
                <body>
                    <div class="container">
                        <div class="header">
                            <div class="avatar">👤</div>
                            <h1>Christian Ronaldo Wiguna</h1>
                            <p>Siswa Kelas 8B</p>
                        </div>

                        <div class="content">
                            <div class="info-item" style="--delay: 0">
                                <div class="icon">🏫</div>
                                <div class="info-text">
                                    <h3>Sekolah</h3>
                                    <p>BPK Penabur</p>
                                </div>
                            </div>

                            <div class="info-item" style="--delay: 1">
                                <div class="icon">📚</div>
                                <div class="info-text">
                                    <h3>Kelas</h3>
                                    <p>8B</p>
                                </div>
                            </div>

                            <div class="info-item" style="--delay: 2">
                                <div class="icon">🎂</div>
                                <div class="info-text">
                                    <h3>Hobi</h3>
                                    <p>Olahraga, Coding, Catur, Membaca, Dan Olahraga</p>
                                </div>
                            </div>

                            <div class="info-item" style="--delay: 3">
                                <div class="icon">💻</div>
                                <div class="info-text">
                                    <h3>Impian</h3>
                                    <p>Software Engineer & Memiliki Perusahaan Teknologi</p>
                                </div>
                            </div>
                        </div>

                        <div class="footer">
                            <p>Terima kasih <span class="heart">❤️</span></p>
                        </div>
                    </div>
                </body>
            </html>
